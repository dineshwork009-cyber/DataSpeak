apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataspeak-frontend
  namespace: dataspeak
  labels:
    app: dataspeak-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dataspeak-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge:       1
  template:
    metadata:
      labels:
        app: dataspeak-frontend
    spec:
      containers:
        - name: frontend
          image: your-acr.azurecr.io/dataspeak-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds:       30
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       10
      imagePullSecrets:
        - name: acr-pull-secret
