apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataspeak-ingress
  namespace: dataspeak
  annotations:
    # Azure Application Gateway Ingress Controller
    kubernetes.io/ingress.class:                     "azure/application-gateway"
    appgw.ingress.kubernetes.io/ssl-redirect:        "true"
    appgw.ingress.kubernetes.io/request-timeout:     "120"
    appgw.ingress.kubernetes.io/connection-draining:              "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout:      "30"
    # Rate limiting (NGINX alternative annotations)
    # nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  tls:
    - hosts:
        - app.dataspeak.io
      secretName: dataspeak-tls
  rules:
    - host: app.dataspeak.io
      http:
        paths:
          # Route /api/* → API service
          - path:     /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
          # Route /* → Frontend service
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
